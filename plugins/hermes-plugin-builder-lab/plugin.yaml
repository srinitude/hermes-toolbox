name: hermes-plugin-builder-lab
kind: standalone
version: 0.1.0
description: Teaches users to design and build Hermes plugins the right way.
provides_tools:
- tutorial_choose_plugin_surface
- tutorial_review_plugin_spec
- tutorial_check_plugin_manifest
