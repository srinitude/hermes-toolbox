name: hermes-config-lab
kind: standalone
version: 0.1.0
description: Teaches Hermes configuration without overwhelming users.
provides_tools:
- tutorial_explain_config_key
- tutorial_recommend_config_path
- tutorial_check_config_safety
provides_commands:
- config-lab
- config-explain
requires_env: []
metadata:
  hermes:
    generated_by: plugin-builder
    public_package: true
    tutorial_level: '1'
provides_skills:
- config-basics
- config-troubleshooting
- secrets-vs-config
