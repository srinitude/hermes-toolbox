name: hermes-assessment-certifier
kind: standalone
version: 0.1.0
description: Tests whether a learner has actually mastered each tutorial stage.
provides_tools:
- tutorial_generate_quiz
- tutorial_grade_answer
- tutorial_assign_capstone
- tutorial_evaluate_capstone
